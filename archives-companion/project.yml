name: ArchivesCompanion
options:
  bundleIdPrefix: com.lucaorion.archives
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  ArchivesCore:
    path: ArchivesCore

targets:
  # Native SwiftUI iPhone app — owns its local store, full editing.
  ArchivesiOS:
    type: application
    platform: iOS
    sources: [ArchivesiOS]
    dependencies:
      - package: ArchivesCore
        product: ArchivesCore
      - package: ArchivesCore
        product: ArchivesStore
    info:
      path: ArchivesiOS/Info.plist
      properties:
        CFBundleDisplayName: Archives
        CFBundleShortVersionString: "0.1"
        CFBundleVersion: "2"
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIAppFonts:
          - SpaceGrotesk.ttf
          - JetBrainsMono.ttf
        # Required for MultipeerConnectivity on iOS 14+ — without these two keys
        # discovery silently never connects.
        NSLocalNetworkUsageDescription: "Archives syncs your notes and media directly with your Mac over the local network — no cloud, no account."
        NSBonjourServices:
          - _archives-sync._tcp
          - _archives-sync._udp
        NSCameraUsageDescription: "Capture photos straight into your Archives media library."
        NSPhotoLibraryUsageDescription: "Add photos from your library to your Archives."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lucaorion.archives.ios
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "2"
        SWIFT_VERSION: "6.0"
        # Set your Apple Developer team here (or in Xcode > Signing & Capabilities).
        DEVELOPMENT_TEAM: X429L5AGXB

  # macOS menu-bar helper — speaks Multipeer to the phone, reads/writes orion.db.
  ArchivesSyncHelper:
    type: application
    platform: macOS
    sources: [ArchivesSyncHelper]
    dependencies:
      - package: ArchivesCore
        product: ArchivesCore
      - package: ArchivesCore
        product: ArchivesStore
    info:
      path: ArchivesSyncHelper/Info.plist
      properties:
        LSUIElement: true   # menu-bar agent, no Dock icon
        NSLocalNetworkUsageDescription: "Archives Sync connects to your iPhone over the local network to exchange notes and media."
        NSBonjourServices:
          - _archives-sync._tcp
          - _archives-sync._udp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lucaorion.archives.synchelper
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "2"
        SWIFT_VERSION: "6.0"
        DEVELOPMENT_TEAM: X429L5AGXB
